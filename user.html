<!DOCTYPE html>
<html>
<head>
  <title>Sorry Boss 🤍</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd6e7, #d6f0ff);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 400px;
      animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
      color: #ff4d6d;
    }

    p {
      font-size: 18px;
      color: #333;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e6004c;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>I'm Sorry Boss 🥺</h1>
    <p>
     Aage ka chapter padh liya… par realize hua ki baat chapter ki nahi, saath chalne ki thi.
Promise todne ka intention nahi tha.
Agar bura laga ho… toh genuinely sorry Boss 🤍”
    </p>

    <button onclick="forgive()">Forgive Employee 😌</button>
  </div>

  <script>
    function forgive() {
      alert("Thank you Boss 🤍 Employee loyal rahega hamesha ✨.");
    }
  </script>

</body>
</html>
